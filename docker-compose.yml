services:
  # ============================================================
  # Infrastructure Layer (internal network only)
  # ============================================================

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./storage/postgres/data:/var/lib/postgresql/data
      - ./storage/postgres/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "127.0.0.1:5673:5672"
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-rabbitmq.rule=Host(`vm-rabbitmq.dev.local`)"
      - "traefik.http.routers.vm-rabbitmq.entrypoints=web"
      - "traefik.http.services.vm-rabbitmq.loadbalancer.server.port=15672"
      - "traefik.http.middlewares.rabbitmq-headers.headers.customResponseHeaders.X-Frame-Options="
      - "traefik.http.middlewares.rabbitmq-headers.headers.customResponseHeaders.Content-Security-Policy="
      - "traefik.http.routers.vm-rabbitmq.middlewares=rabbitmq-headers"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./storage/minio/data:/data
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-minio.rule=Host(`vm-minio.dev.local`)"
      - "traefik.http.routers.vm-minio.entrypoints=web"
      - "traefik.http.services.vm-minio.loadbalancer.server.port=9001"
      - "traefik.http.middlewares.minio-headers.headers.customResponseHeaders.X-Frame-Options="
      - "traefik.http.middlewares.minio-headers.headers.customResponseHeaders.Content-Security-Policy="
      - "traefik.http.routers.vm-minio.middlewares=minio-headers"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Orchestration Layer (n8n has Web UI → traefik-net)
  # ============================================================

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://n8n:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-n8n.rule=Host(`vm-n8n.dev.local`)"
      - "traefik.http.routers.vm-n8n.entrypoints=web"
      - "traefik.http.services.vm-n8n.loadbalancer.server.port=5678"
      - "traefik.http.middlewares.n8n-headers.headers.customResponseHeaders.X-Frame-Options="
      - "traefik.http.middlewares.n8n-headers.headers.customResponseHeaders.Content-Security-Policy="
      - "traefik.http.routers.vm-n8n.middlewares=n8n-headers"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Content Generation Layer
  # ============================================================

  moneyprinter:
    image: ghcr.io/harry0703/moneyprinterturbo:latest
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      - moneyprinter_data:/app/storage
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-mpt.rule=Host(`vm-mpt.dev.local`)"
      - "traefik.http.routers.vm-mpt.entrypoints=web"
      - "traefik.http.services.vm-mpt.loadbalancer.server.port=8501"

  content-planner:
    build: ./services/content-planner
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # Processing Layer (internal only — needs HTTPS outbound)
  # ============================================================

  video-mutator:
    build: ./services/video-mutator
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  content-router:
    build: ./services/content-router
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Publishing Layer (internal only — needs HTTPS outbound)
  # ============================================================

  publisher:
    build: ./services/publisher
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - PROXY_POOL_URL=${PROXY_POOL_URL}
      - CONTENT_ROUTER_URL=http://content-router:8000
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ============================================================
  # Portal (unified dashboard)
  # ============================================================

  portal:
    build: ./services/portal
    restart: unless-stopped
    environment:
      - SERVER_IP=9.135.86.144
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-portal.rule=Host(`vm.dev.local`)"
      - "traefik.http.routers.vm-portal.entrypoints=web"
      - "traefik.http.services.vm-portal.loadbalancer.server.port=8000"

  # ============================================================
  # Monitoring Layer (Grafana has Web UI → traefik-net)
  # ============================================================

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm-grafana.rule=Host(`vm-grafana.dev.local`)"
      - "traefik.http.routers.vm-grafana.entrypoints=web"
      - "traefik.http.services.vm-grafana.loadbalancer.server.port=3000"

volumes:
  n8n_data:
  moneyprinter_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  traefik-net:
    name: traefik-net
    external: true
